services:
  server-dev:
    build:
      context: .
      dockerfile: docker/server-dev.Dockerfile
    command: ["/bin/bash", "/usr/local/bin/server-dev"]
    environment:
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: 3000
      API_HOST: 127.0.0.1
      API_PORT: 3001
      CARGO_HOME: /workspace/.server/cargo-home
      CARGO_TARGET_DIR: /workspace/.server/target
    init: true
    ports:
      - "3000:3000"
    working_dir: /workspace
    volumes:
      - .:/workspace
